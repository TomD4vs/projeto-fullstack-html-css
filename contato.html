<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contato | Elyton</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./css/contato.css" />
</head>

<body>
    <div class="overlay">
        <div class="modal">
            <a href="index.html" class="back"><i class="fa-solid fa-arrow-left"></i> Voltar</a>
            <h2>Contato</h2>
            <p>Respondo em até 24h</p>

            <form id="form" novalidate>
                <div class="field">
                    <label>Assunto *</label>
                    <select id="assunto">
                        <option value="">Selecione…</option>
                        <option>Projeto Web</option>
                        <option>Freelance</option>
                        <option>Parceria</option>
                        <option>Outro</option>
                    </select>
                    <span class="err" id="err-assunto"></span>
                </div>

                <div class="field">
                    <label>Nome completo *</label>
                    <input type="text" id="nome" placeholder="Seu nome completo" />
                    <span class="err" id="err-nome"></span>
                </div>

                <div class="row">
                    <div class="field">
                        <label>E-mail *</label>
                        <input type="email" id="email" placeholder="seu@email.com" />
                        <span class="err" id="err-email"></span>
                    </div>
                    <div class="field">
                        <label>Telefone</label>
                        <input type="tel" id="tel" placeholder="(99) 99999-9999" maxlength="15" />
                    </div>
                </div>

                <div class="field">
                    <label>Mensagem *</label>
                    <textarea id="msg" rows="4" placeholder="Escreva aqui…"></textarea>
                    <span class="err" id="err-msg"></span>
                </div>

                <button type="submit" id="btn">
                    <i class="fa-solid fa-paper-plane"></i> Enviar mensagem
                </button>
                <div class="feedback" id="feedback"></div>
            </form>
        </div>
    </div>
    <script src="./js/contato.js"></script>
</body>

</html>
